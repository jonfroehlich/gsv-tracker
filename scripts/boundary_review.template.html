<!DOCTYPE html>
<!--
  Boundary-review viewer (issue #91). Generated by scripts/build_boundary_review.py:
  the /*__DATA__*/ placeholder near the bottom is replaced with the per-city
  payload JSON to produce a self-contained audit/boundary_review.html.
  Do not open this template directly — it has no data.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSV Tracker — Boundary review</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <style>
    :root {
      --frozen: #e8482c;   /* current frozen grid */
      --bbox:   #1a73e8;   /* OSM bounding box */
      --poly:   #17becf;   /* OSM boundary polygon */
      --rec:    #2ca02c;   /* recommended geometry */
      --old:    #7a5195;   /* pre-fix rectangle (resize before/after) */
      --manual: #d4249a;   /* reviewer-drawn manual rectangle */
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; color: #1a1a1a;
    }
    /* ---- sidebar ---- */
    #sidebar {
      width: 340px; flex: 0 0 340px; height: 100%;
      display: flex; flex-direction: column;
      background: #f7f7f8; border-right: 1px solid #ddd;
    }
    #sidebar header { padding: 12px 14px; border-bottom: 1px solid #e2e2e2; }
    #sidebar h1 { font-size: 15px; margin: 0 0 6px; }
    #progress { font-size: 12px; color: #666; }
    #progress b { color: #1a1a1a; }
    #banner {
      margin-top: 6px; font-size: 11px; color: #8a6d00;
      background: #fff7e0; border: 1px solid #f0d98a; border-radius: 4px;
      padding: 4px 7px; display: none;
    }
    #export {
      margin-top: 8px; width: 100%; padding: 7px; cursor: pointer;
      border: 1px solid #1a73e8; background: #1a73e8; color: #fff;
      border-radius: 5px; font-size: 12px; font-weight: 600;
    }
    #export:hover { background: #1662c4; }
    #reset {
      margin-top: 6px; width: 100%; padding: 5px; cursor: pointer;
      border: 1px solid #ccc; background: #fff; color: #777;
      border-radius: 5px; font-size: 11px;
    }
    #reset:hover { color: #c0392b; border-color: #c0392b; }
    #filters { padding: 8px 14px; border-bottom: 1px solid #e2e2e2; }
    #filter-tools { margin-bottom: 5px; }
    .flink {
      font-size: 11px; color: #1a73e8; cursor: pointer; margin-right: 10px;
      user-select: none;
    }
    .flink:hover { text-decoration: underline; }
    .flink.disabled { color: #bbb; cursor: default; text-decoration: none; }
    .chip {
      display: inline-block; margin: 3px 4px 3px 0; padding: 3px 8px;
      border: 1px solid #ccc; border-radius: 12px; cursor: pointer;
      background: #fff; user-select: none; font-size: 11px;
    }
    .chip.on { background: #333; color: #fff; border-color: #333; }
    #search {
      margin: 0 14px 8px; padding: 6px 8px; font: inherit; font-size: 12px;
      border: 1px solid #ccc; border-radius: 5px; width: calc(100% - 28px);
    }
    #search:focus { outline: none; border-color: #1a73e8; }
    #list { flex: 1; overflow-y: auto; }
    #list .none { color: #999; padding: 14px; text-align: center; font-size: 12px; }
    .city {
      padding: 8px 14px; border-bottom: 1px solid #ededed; cursor: pointer;
      display: flex; align-items: baseline; gap: 6px;
    }
    .city:hover { background: #ececf0; }
    .city.sel { background: #dbe8ff; }
    .city .nm { flex: 1; font-weight: 500; }
    .city .vd { font-size: 10px; color: #888; text-transform: none; }
    .city .dot {
      flex: 0 0 auto; width: 9px; height: 9px; border-radius: 50%;
      background: #ccc; margin-top: 3px;
    }
    .city .dot.current { background: var(--frozen); }
    .city .dot.before { background: var(--old); }
    .city .dot.bbox { background: var(--bbox); }
    .city .dot.recommended { background: var(--rec); }
    .city .dot.manual { background: var(--manual); }
    .city .dot.skip { background: #f0ad4e; }
    /* ---- map ---- */
    #map { flex: 1; height: 100%; }
    /* ---- overlays on the map ---- */
    .panel {
      background: rgba(255,255,255,0.94); border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3); padding: 10px 12px;
    }
    #legend { line-height: 1.7; font-size: 12px; }
    #legend .lg { cursor: pointer; border-radius: 4px; padding: 0 4px; }
    #legend .lg:hover { background: rgba(0,0,0,0.08); }
    #legend .lg.disabled { cursor: default; opacity: 0.32; }
    #legend .lg.disabled:hover { background: none; }
    #legend .lg.chosen { background: rgba(44,160,44,0.14); font-weight: 700; }
    #legend .lg.chosen .lglabel::after { content: " ✓ selected"; color: #1b7e1b; }
    #legend .lghint { color: #999; font-size: 10px; margin-top: 5px; }
    #legend .lgvis { margin: 0 5px 0 0; vertical-align: middle; cursor: pointer; }
    #legend .lg.disabled .lgvis { cursor: default; }
    #legend .sw {
      display: inline-block; width: 22px; height: 0;
      border-top-width: 3px; border-top-style: solid; vertical-align: middle;
      margin-right: 6px;
    }
    #legend .swpoly { border-top-style: solid; }
    #info { max-width: 320px; }
    #info h2 { font-size: 14px; margin: 0 0 2px; }
    #info .vd { font-size: 11px; font-weight: 700; letter-spacing: .3px; }
    #info .reason { color: #555; margin: 4px 0 8px; font-size: 12px; }
    #info table { border-collapse: collapse; font-size: 11px; margin-bottom: 8px; }
    #info td { padding: 1px 8px 1px 0; color: #444; }
    #info td.k { color: #888; }
    .decision label { display: block; margin: 3px 0; cursor: pointer; }
    .decision input { margin-right: 6px; }
    /* swatch on each radio, colored to match its legend layer (1:1 mapping) */
    .decision .dsw {
      display: inline-block; width: 10px; height: 10px; border-radius: 2px;
      margin-right: 5px; vertical-align: middle; border: 1px solid rgba(0,0,0,0.15);
    }
    .decision .dsw.dnone { background: #ccc; }
    #note {
      width: 100%; margin-top: 6px; font: inherit; font-size: 12px;
      padding: 4px; border: 1px solid #ccc; border-radius: 4px; resize: vertical;
    }
    /* ---- manual rectangle editor ---- */
    .manual {
      margin-top: 7px; padding-top: 7px; border-top: 1px dashed #ddd;
    }
    .manual .mtitle {
      font-size: 11px; font-weight: 700; color: var(--manual);
      letter-spacing: .2px; margin-bottom: 4px;
    }
    #m-draw {
      font: inherit; font-size: 11px; padding: 4px 9px; cursor: pointer;
      border: 1px solid var(--manual); background: #fff; color: var(--manual);
      border-radius: 5px; font-weight: 600;
    }
    #m-draw:hover { background: var(--manual); color: #fff; }
    #m-draw.drawing { background: var(--manual); color: #fff; }
    #m-clear {
      font-size: 11px; color: #999; cursor: pointer; margin-left: 8px;
    }
    #m-clear:hover { color: #c0392b; text-decoration: underline; }
    #m-fields { margin-top: 6px; font-size: 11px; color: #555; }
    #m-fields label { display: inline; }
    #m-fields input {
      width: 62px; font: inherit; font-size: 11px; padding: 2px 4px;
      border: 1px solid #ccc; border-radius: 3px; margin: 2px 2px 2px 0;
    }
    #m-fields .mrow { margin: 2px 0; }
    .mhint { color: #999; font-size: 10px; margin-top: 5px; line-height: 1.35; }
    /* draggable edit handles for the manual rectangle */
    .mh {
      background: #fff; border: 2px solid var(--manual);
      box-sizing: border-box; border-radius: 2px;
    }
    .mh.mhc { border-radius: 50%; background: var(--manual); }
    .hint { color: #999; font-size: 11px; margin-top: 6px; }
    #empty { color: #888; padding: 20px; text-align: center; }
    .ov-tip { font-size: 12px; line-height: 1.35; }
    .ov-tip b { font-weight: 600; }
  </style>
</head>
<body>
  <div id="sidebar">
    <header>
      <h1>Boundary review</h1>
      <div id="progress"></div>
      <div id="banner"></div>
      <button id="export">Export decisions.csv</button>
      <button id="reset">Clear saved decisions</button>
    </header>
    <div id="filters"></div>
    <input id="search" type="search" placeholder="Search cities by name…"
           autocomplete="off" aria-label="Search cities by name" />
    <div id="list"></div>
  </div>
  <div id="map"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script>
    "use strict";
    const CITIES = /*__DATA__*/;
    const META = /*__META__*/ || {};
    const STORE_KEY = "gsv_boundary_decisions_v2";
    const VERDICTS = ["UNDER", "WRONG_PLACE", "NO_POLYGON", "OVER", "NOT_FOUND", "RESIZE"];
    // Concrete hex values — Leaflet writes these as SVG stroke attributes, where
    // CSS var() would not resolve. Must match the :root custom properties above.
    const COLORS = { frozen: "#e8482c", bbox: "#1a73e8", poly: "#17becf",
                     rec: "#2ca02c", old: "#7a5195", manual: "#d4249a" };

    // Meters<->degrees, matching boundary_audit.frozen_rect_bounds exactly so a
    // reviewer-drawn rectangle uses the same convention as the frozen grids.
    const M_PER_DEG_LAT = 110540, M_PER_DEG_LON_EQ = 111320;
    const _mPerLon = (lat) => M_PER_DEG_LON_EQ * Math.cos(lat * Math.PI / 180);
    // center+size (meters) -> Leaflet [[s,w],[n,e]] bounds.
    function rectBounds(lat, lon, w, h) {
      const halfH = (h / 2) / M_PER_DEG_LAT, halfW = (w / 2) / _mPerLon(lat);
      return [[lat - halfH, lon - halfW], [lat + halfH, lon + halfW]];
    }
    // L.latLngBounds -> {center_lat, center_lon, width_m, height_m} (rounded m).
    function boundsToGeom(b) {
      const lat = (b.getNorth() + b.getSouth()) / 2;
      const lon = (b.getEast() + b.getWest()) / 2;
      return {
        center_lat: lat, center_lon: lon,
        width_m: Math.round((b.getEast() - b.getWest()) * _mPerLon(lat)),
        height_m: Math.round((b.getNorth() - b.getSouth()) * M_PER_DEG_LAT),
      };
    }
    // A decision picks WHICH rectangle becomes the catalog geometry. Each value
    // maps 1:1 to a legend layer (and its color); chosenGeom() resolves it to
    // that layer's geometry for export. Only options whose geometry exists for a
    // city are offered (see decOptions). manualGeom/recIsKeepCurrent are defined
    // below — geom() closures run at render time, after the whole script loads.
    const DECISION_DEFS = {
      current:     { label: "Keep current search grid", color: "frozen",
                     geom: (c) => c.frozen_geom,
                     desc: "Leave the catalog geometry unchanged (red rectangle)." },
      before:      { label: "Revert to grid before resize", color: "old",
                     geom: (c) => c.old_geom,
                     desc: "Set the grid back to what it was before the automatic resize (purple)." },
      bbox:        { label: "Use OSM bounding box", color: "bbox",
                     geom: (c) => c.osm_bbox_geom,
                     desc: "Set the grid to the OSM bounding box (blue rectangle)." },
      recommended: { label: "Apply recommended grid", color: "rec",
                     geom: (c) => c.rec_geom,
                     desc: "Apply the audit's recommended recenter/resize (green rectangle)." },
      manual:      { label: "Use manual rectangle", color: "manual",
                     geom: (c) => manualGeom(c),
                     desc: "Apply the rectangle you drew for this city (magenta)." },
      skip:        { label: "Skip / defer", color: null,
                     geom: () => null,
                     desc: "Make no change; revisit later. Add a note if useful." },
    };

    // Options offered for a city, in legend order — only those with a geometry.
    function decOptions(city) {
      const out = ["current"];
      if (city.old_geom) out.push("before");
      if (city.osm_bbox_geom) out.push("bbox");
      if (city.rec_geom && !recIsKeepCurrent(city)) out.push("recommended");
      out.push("manual");   // always listed; enabled only once a rectangle is drawn
      out.push("skip");
      return out;
    }

    // Group key for filtering: resize cities collapse under a synthetic "RESIZE".
    const groupKey = (c) => (c.group === "resize" ? "RESIZE" : c.verdict);

    // ---- persisted decisions ----
    let decisions = {};
    try { decisions = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { decisions = {}; }
    const saveDecisions = () =>
      localStorage.setItem(STORE_KEY, JSON.stringify(decisions));

    // ---- map + base layers ----
    const map = L.map("map", { zoomControl: true }).setView([20, 0], 2);
    const voyager = L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
      { maxZoom: 19, attribution: "© OpenStreetMap contributors © CARTO" }).addTo(map);
    const satellite = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      { maxZoom: 19, attribution: "Tiles © Esri" });
    L.control.layers({ "CARTO Voyager": voyager, "Esri satellite": satellite },
                     null, { position: "topright" }).addTo(map);

    let overlay = L.layerGroup().addTo(map);   // current city's drawn shapes
    let currentLayers = {};                    // key -> drawn layer, for the legend
    const manualLayer = L.layerGroup().addTo(map);  // reviewer-drawn rectangle + handles
    const choiceLayer = L.layerGroup().addTo(map);  // highlight of the currently-selected decision

    // ---- legend (interactive: click a row to fly to that overlay) ----
    const LEGEND_ROWS = [
      { key: "frozen", label: "Current search grid", color: "var(--frozen)", dash: false,
        desc: "The city's search grid as stored in the catalog right now (its " +
              "\"frozen\" geometry). This is the rectangle collection samples today — " +
              "the thing you're deciding whether to change." },
      { key: "old",    label: "Grid before resize", color: "var(--old)", dash: true,
        desc: "Resize cities only. The search grid BEFORE the automatic " +
              "recenter-and-grow fix was applied. Compare it against the current " +
              "search grid to confirm the fix moved/sized things correctly." },
      { key: "bbox",   label: "OSM bounding box", color: "var(--bbox)", dash: true,
        desc: "The rectangular min/max lat-lon extent of the city's OpenStreetMap " +
              "boundary. The search grid should roughly cover this box." },
      { key: "poly",   label: "OSM boundary polygon", color: "var(--poly)", dash: false,
        desc: "The actual OpenStreetMap administrative boundary outline for the " +
              "city (always smaller than its bounding box)." },
      { key: "rec",    label: "Recommended grid", color: "var(--rec)", dash: true,
        desc: "The grid geometry the audit recommends you apply. Shown only when it " +
              "differs from the current grid; otherwise the recommendation is to keep " +
              "the current grid." },
    ];
    let legendEl = null;
    // Per-layer visibility, persisted across cities so you can e.g. hide the
    // frozen box everywhere to reveal what sits beneath it.
    const layerVisible = { frozen: true, old: true, bbox: true, poly: true, rec: true };
    const legend = L.control({ position: "topright" });
    legend.onAdd = function () {
      const d = L.DomUtil.create("div", "panel");
      d.id = "legend";
      LEGEND_ROWS.forEach((r) => {
        const row = document.createElement("div");
        row.className = "lg";
        row.dataset.key = r.key;
        row.title = r.desc;   // hover explanation of what this overlay is
        row.innerHTML =
          `<input type="checkbox" class="lgvis" ${layerVisible[r.key] ? "checked" : ""}>` +
          `<span class="sw" style="border-color:${r.color};` +
          `border-top-style:${r.dash ? "dashed" : "solid"}"></span>` +
          `<span class="lglabel">${r.label}</span>`;
        const cb = row.querySelector(".lgvis");
        cb.onclick = (e) => e.stopPropagation();           // don't trigger zoom
        cb.onchange = () => toggleLayer(r.key, cb.checked);
        row.querySelector(".sw").onclick = () => focusLayer(r.key);
        row.querySelector(".lglabel").onclick = () => focusLayer(r.key);
        d.appendChild(row);
      });
      const hint = L.DomUtil.create("div", "lghint", d);
      hint.innerHTML =
        "click a label to zoom · checkbox to show/hide<br>" +
        `<span class="sw" style="border-color:var(--manual);border-top-style:dashed">` +
        `</span>your manual rectangle (drawn in the info panel)`;
      hint.title = "The rectangle you draw for a city with \"Draw on map\" — " +
        "exported as its chosen geometry.";
      L.DomEvent.disableClickPropagation(d);
      legendEl = d;
      return d;
    };
    legend.addTo(map);

    // Show/hide a drawn layer without redrawing the city.
    function toggleLayer(key, show) {
      layerVisible[key] = show;
      const l = currentLayers[key];
      if (!l) return;
      if (show) l.addTo(overlay); else overlay.removeLayer(l);
    }

    // The recommendation for WRONG_PLACE / OVER / etc. is "keep current", so the
    // recommended rectangle would coincide exactly with the frozen one. Detect
    // that so we don't draw an invisible duplicate the user then hunts for.
    function recIsKeepCurrent(city) {
      const r = city.rec_geom, f = city.frozen_geom;
      if (!r || !f) return false;
      return Math.abs(r.center_lat - f.center_lat) < 1e-4 &&
             Math.abs(r.center_lon - f.center_lon) < 1e-4 &&
             Math.abs(r.width_m - f.width_m) < 50 &&
             Math.abs(r.height_m - f.height_m) < 50;
    }

    // Fly to a single overlay by legend key and flash it — the way to find the
    // tiny, far-away OSM boxes on WRONG_PLACE cities. Reveals it first if hidden.
    function focusLayer(key) {
      const l = currentLayers[key];
      if (!l || !l.getBounds) return;
      if (!layerVisible[key]) {                 // clicking a hidden label reveals it
        toggleLayer(key, true);
        const cb = legendEl && legendEl.querySelector(`.lg[data-key="${key}"] .lgvis`);
        if (cb) cb.checked = true;
      }
      map.flyToBounds(l.getBounds().pad(0.25), { maxZoom: 15, duration: 0.6 });
      const restyle = (w) => { try { l.setStyle({ weight: w }); } catch (e) {} };
      restyle(6);
      setTimeout(() => restyle(2), 700);
    }

    function updateLegend(city) {
      if (!legendEl) return;
      const recKeep = recIsKeepCurrent(city);
      legendEl.querySelectorAll(".lg").forEach((row) => {
        const key = row.dataset.key;
        const present = !!currentLayers[key];
        const base = LEGEND_ROWS.find((r) => r.key === key).label;
        row.querySelector(".lglabel").textContent =
          (key === "rec" && recKeep) ? "Recommended = keep current" : base;
        row.classList.toggle("disabled", !present);
        const cb = row.querySelector(".lgvis");
        // rec-as-keep-current visibility follows the frozen box, so lock its box.
        cb.disabled = !present || (key === "rec" && recKeep);
        cb.checked = present && layerVisible[key] !== false;
      });
    }

    // Decision-color -> legend row key (the layers with a legend row). "manual"
    // has a color but no legend row; "skip" has no color.
    const legendKeyFor = (def) =>
      def && def.color && LEGEND_ROWS.some((r) => r.key === def.color) ? def.color : null;

    // Highlight the rectangle the current decision selects, and mark the matching
    // legend row, so the map + legend always reflect what's chosen. Reveals the
    // underlying layer if it was hidden so nothing is highlighted-but-invisible.
    function renderChoice(city) {
      choiceLayer.clearLayers();
      if (legendEl)
        legendEl.querySelectorAll(".lg.chosen").forEach((r) => r.classList.remove("chosen"));
      const decision = (decisions[city.city_id] || {}).decision || "";
      const def = DECISION_DEFS[decision];
      if (!def || !def.color) return;            // skip / undecided → no highlight
      const geom = chosenGeom(city, decision);
      if (!geom) return;
      const color = COLORS[def.color];
      const halo = L.rectangle(
        rectBounds(geom.center_lat, geom.center_lon, geom.width_m, geom.height_m),
        { color, weight: 5, opacity: 1, fillColor: color, fillOpacity: 0.1 })
        .addTo(choiceLayer);
      halo.bindTooltip(`✓ selected: ${escapeHtml(def.label)}`,
        { sticky: true, direction: "top", className: "ov-tip", opacity: 0.95 });
      if (halo.bringToFront) halo.bringToFront();
      // brief flash to draw the eye to the newly-selected rectangle
      setTimeout(() => { try { halo.setStyle({ weight: 5 }); } catch (e) {} }, 350);
      halo.setStyle({ weight: 8 });

      const legKey = legendKeyFor(def);
      if (legKey) {
        if (currentLayers[legKey] && layerVisible[legKey] === false) {
          toggleLayer(legKey, true);           // reveal so legend + map agree
          const cb = legendEl && legendEl.querySelector(`.lg[data-key="${legKey}"] .lgvis`);
          if (cb) cb.checked = true;
        }
        const row = legendEl && legendEl.querySelector(`.lg[data-key="${legKey}"]`);
        if (row) row.classList.add("chosen");
      }
    }

    // ---- info + decision panel (bottom-left) ----
    const info = L.control({ position: "bottomleft" });
    info.onAdd = function () {
      const d = L.DomUtil.create("div", "panel");
      d.id = "info";
      d.innerHTML = '<div id="empty">Select a city to review.</div>';
      L.DomEvent.disableClickPropagation(d);
      L.DomEvent.disableScrollPropagation(d);
      return d;
    };
    info.addTo(map);

    // ---- filter state ----
    const activeFilters = new Set(VERDICTS);
    function counts() {
      const c = {};
      VERDICTS.forEach((v) => (c[v] = 0));
      CITIES.forEach((city) => { c[groupKey(city)] = (c[groupKey(city)] || 0) + 1; });
      return c;
    }
    // The verdicts that actually have cities — the universe "All" selects.
    const presentVerdicts = () => {
      const c = counts();
      return VERDICTS.filter((v) => c[v]);
    };
    function renderFilters() {
      const c = counts();
      const el = document.getElementById("filters");
      el.innerHTML = "";
      const present = presentVerdicts();

      // All / None toggles for the whole filter set.
      const allOn = present.every((v) => activeFilters.has(v));
      const tools = document.createElement("div");
      tools.id = "filter-tools";
      const mk = (label, disabled, fn) => {
        const b = document.createElement("span");
        b.className = "flink" + (disabled ? " disabled" : "");
        b.textContent = label;
        if (!disabled) b.onclick = fn;
        return b;
      };
      tools.appendChild(mk("All", allOn, () => {
        present.forEach((v) => activeFilters.add(v));
        renderFilters();
        renderList();
      }));
      tools.appendChild(mk("None", activeFilters.size === 0, () => {
        activeFilters.clear();
        renderFilters();
        renderList();
      }));
      el.appendChild(tools);

      present.forEach((v) => {
        const chip = document.createElement("span");
        chip.className = "chip" + (activeFilters.has(v) ? " on" : "");
        chip.textContent = `${v} ${c[v]}`;
        chip.onclick = () => {
          activeFilters.has(v) ? activeFilters.delete(v) : activeFilters.add(v);
          renderFilters();
          renderList();
        };
        el.appendChild(chip);
      });
    }

    // ---- city list ----
    let visible = [];       // filtered CITIES, in display order
    let selIndex = -1;      // index into `visible`
    let selCityId = null;   // selected city, tracked by id so it survives re-filtering
    let searchTerm = "";    // sidebar name search
    function renderList() {
      const q = searchTerm.trim().toLowerCase();
      visible = CITIES.filter((c) => activeFilters.has(groupKey(c)) &&
        (!q || c.display_name.toLowerCase().includes(q)));
      // Keep the same city selected across filter/search changes (indices shift).
      selIndex = selCityId == null ? -1
        : visible.findIndex((c) => c.city_id === selCityId);
      const el = document.getElementById("list");
      el.innerHTML = "";
      if (!visible.length) {
        el.innerHTML = `<div class="none">no cities match</div>`;
        updateProgress();
        return;
      }
      visible.forEach((city, i) => {
        const row = document.createElement("div");
        row.className = "city" + (i === selIndex ? " sel" : "");
        const dec = (decisions[city.city_id] || {}).decision || "";
        row.innerHTML =
          `<span class="dot ${dec}"></span>` +
          `<span class="nm">${escapeHtml(city.display_name)}</span>` +
          `<span class="vd">${groupKey(city)}</span>`;
        row.onclick = () => selectIndex(i);
        el.appendChild(row);
      });
      updateProgress();
    }

    function updateProgress() {
      const decided = CITIES.filter((c) => decisions[c.city_id] &&
                                    decisions[c.city_id].decision).length;
      document.getElementById("progress").innerHTML =
        `<b>${decided}</b> / ${CITIES.length} decided` +
        `&nbsp;·&nbsp;showing ${visible.length}`;
    }

    // ---- selecting + drawing a city ----
    function selectIndex(i) {
      if (i < 0 || i >= visible.length) return;
      exitDrawMode();               // leaving a city cancels any in-progress draw
      selIndex = i;
      const city = visible[i];
      selCityId = city.city_id;
      draw(city);
      renderManual(city);           // reviewer-drawn rectangle for this city, if any
      renderInfo(city);
      renderChoice(city);           // highlight whatever decision is already recorded
      // keep selection highlighted without a full re-render
      document.querySelectorAll(".city").forEach((n, idx) =>
        n.classList.toggle("sel", idx === i));
      const selNode = document.querySelectorAll(".city")[i];
      if (selNode) selNode.scrollIntoView({ block: "nearest" });
    }

    // A cursor-following tooltip naming a layer + its size, colored to match.
    // Sticky so it tracks the mouse along the (fill:false) rectangle borders.
    function tip(layer, color, title, detail) {
      layer.bindTooltip(
        `<span style="color:${color}">■</span> <b>${title}</b>` +
        (detail ? `<br>${detail}` : ""),
        { sticky: true, direction: "top", opacity: 0.95, className: "ov-tip" });
      return layer;
    }

    function draw(city) {
      overlay.clearLayers();
      currentLayers = {};
      const collect = [];   // for fitBounds
      const recKeep = recIsKeepCurrent(city);
      const info = city.info || {};
      const bboxStr = (info.osm_bbox_width_m && info.osm_bbox_height_m)
        ? `${(info.osm_bbox_width_m/1000).toFixed(1)}×${(info.osm_bbox_height_m/1000).toFixed(1)} km`
        : null;

      // Store every layer in currentLayers, but only add it to the map (and to
      // the fitBounds set) when its legend checkbox is on.
      const place = (key, layer, collectIt) => {
        currentLayers[key] = layer;
        if (layerVisible[key] !== false) {
          layer.addTo(overlay);
          if (collectIt) collect.push(layer);
        }
        return layer;
      };

      if (city.osm_polygon) {
        place("poly", tip(L.geoJSON({ type: "Feature", geometry: city.osm_polygon },
          { style: { color: COLORS.poly, weight: 2, fillColor: COLORS.poly,
                     fillOpacity: 0.08 } }),
          COLORS.poly, "OSM boundary polygon",
          info.osm_polygon_area_km2 != null
            ? `area ${fmt(info.osm_polygon_area_km2, "km2")}` : null), true);
      }
      if (city.osm_bbox_bounds) {
        place("bbox", tip(L.rectangle(city.osm_bbox_bounds,
          { color: COLORS.bbox, weight: 2, dashArray: "6 4", fill: false }),
          COLORS.bbox, "OSM bounding box", bboxStr), false);
      }
      if (city.old_bounds) {
        place("old", tip(L.rectangle(city.old_bounds,
          { color: COLORS.old, weight: 2, dashArray: "4 5", fill: false }),
          COLORS.old, "Grid before resize", sizeStr(city.old_geom)), true);
      }
      // Draw the recommendation only when it differs from the frozen grid; when
      // it's "keep current" they coincide and we alias rec -> frozen below.
      if (city.rec_bounds && !recKeep) {
        place("rec", tip(L.rectangle(city.rec_bounds,
          { color: COLORS.rec, weight: 2, dashArray: "6 4", fill: false }),
          COLORS.rec, "Recommended grid", sizeStr(city.rec_geom)), false);
      }
      if (city.frozen_bounds) {
        place("frozen", tip(L.rectangle(city.frozen_bounds,
          { color: COLORS.frozen, weight: 2, fill: false }),
          COLORS.frozen, "Current search grid", sizeStr(city.frozen_geom)), true);
      }
      // "Recommended = keep current": point the legend's rec row at the frozen box.
      if (recKeep && currentLayers.frozen) currentLayers.rec = currentLayers.frozen;
      if (city.osm_center) {
        tip(L.circleMarker(city.osm_center,
          { radius: 5, color: "#fff", weight: 1, fillColor: COLORS.bbox,
            fillOpacity: 1 }), COLORS.bbox, "OSM representative point").addTo(overlay);
      }
      if (city.frozen_geom) {
        tip(L.circleMarker([city.frozen_geom.center_lat, city.frozen_geom.center_lon],
          { radius: 5, color: "#fff", weight: 1, fillColor: COLORS.frozen,
            fillOpacity: 1 }), COLORS.frozen, "Current grid center").addTo(overlay);
      }

      const bounds = collect.reduce(
        (acc, l) => (acc ? acc.extend(l.getBounds()) : L.latLngBounds(l.getBounds())),
        null);
      if (bounds && bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });

      updateLegend(city);   // gray out rows this city has no layer for
    }

    // "W×H km" for a geometry dict, or "—".
    function sizeStr(g) {
      return g ? `${(g.width_m/1000).toFixed(1)}×${(g.height_m/1000).toFixed(1)} km` : "—";
    }

    function fmt(x, unit) {
      if (x === null || x === undefined) return "—";
      return unit === "km" ? x.toFixed(1) + " km"
           : unit === "pct" ? (x * 100).toFixed(0) + "%"
           : unit === "km2" ? Math.round(x).toLocaleString() + " km²"
           : String(x);
    }

    function renderInfo(city) {
      const d = decisions[city.city_id] || {};
      const info = city.info || {};
      const bboxSize = (info.osm_bbox_width_m && info.osm_bbox_height_m)
        ? `${(info.osm_bbox_width_m/1000).toFixed(0)}×${(info.osm_bbox_height_m/1000).toFixed(0)} km`
        : "—";
      // group-specific geometry row: manual shows the recommendation, resize
      // shows the applied before→after change.
      const recKeep = recIsKeepCurrent(city);
      const recCell = recKeep ? "keep current (no change)" : sizeStr(city.rec_geom);
      // resize cities show before→after (after == the frozen grid), so a separate
      // frozen-grid row would duplicate it; manual cities show frozen explicitly.
      const frozenRow = city.group === "resize" ? ""
        : `<tr><td class="k">frozen grid</td><td>${sizeStr(city.frozen_geom)}</td></tr>`;
      const geomRow = city.group === "resize"
        ? `<tr><td class="k">before → after</td><td>${sizeStr(city.old_geom)} → ${sizeStr(city.frozen_geom)}</td></tr>`
        : `<tr><td class="k">recommended</td><td>${recCell}</td></tr>`;
      const opts = decOptions(city);
      const keys = opts.map((k, i) => `${i + 1} ${k}`).join(" · ");
      const mg = manualGeom(city);
      const fields = mg
        ? `<div id="m-fields">` +
            `<div class="mrow"><label>size</label> ` +
              `<input id="m-w" type="number" step="0.1" min="0" value="${(mg.width_m/1000).toFixed(2)}"> × ` +
              `<input id="m-h" type="number" step="0.1" min="0" value="${(mg.height_m/1000).toFixed(2)}"> km</div>` +
            `<div class="mrow"><label>center</label> ` +
              `<input id="m-lat" type="number" step="0.0001" value="${mg.center_lat.toFixed(5)}">, ` +
              `<input id="m-lon" type="number" step="0.0001" value="${mg.center_lon.toFixed(5)}"></div>` +
          `</div>`
        : "";
      const manualBlock =
        `<div class="manual">` +
          `<div class="mtitle">Manual rectangle</div>` +
          `<button id="m-draw" type="button">${mg ? "Redraw on map" : "Draw on map"}</button>` +
          (mg ? `<span id="m-clear">clear</span>` : "") +
          fields +
          (mg ? `<div class="mhint">Drag the corners or center to resize — ` +
                `changes save automatically. Solid magenta = saved; dashed = ` +
                `mid-edit.</div>` : "") +
        `</div>`;
      const el = document.getElementById("info");
      el.innerHTML =
        `<h2>${escapeHtml(city.display_name)}</h2>` +
        `<div class="vd" style="color:var(--frozen)">${groupKey(city)}</div>` +
        `<div class="reason">${escapeHtml(city.rec_basis || city.reason || "")}</div>` +
        `<table>` +
          `<tr><td class="k">center offset</td><td>${fmt(info.center_dist_km, "km")}</td></tr>` +
          `<tr><td class="k">coverage before</td><td>${fmt(info.coverage_before, "pct")}</td></tr>` +
          `<tr><td class="k">OSM bbox</td><td>${bboxSize}</td></tr>` +
          `<tr><td class="k">OSM polygon</td><td>${fmt(info.osm_polygon_area_km2, "km2")}</td></tr>` +
          frozenRow +
          geomRow +
          (mg ? `<tr><td class="k">manual</td><td>${sizeStr(mg)}</td></tr>` : "") +
        `</table>` +
        `<div class="decision">` +
          opts.map((k) => radio(city, k, !!mg)).join("") +
          `<textarea id="note" rows="2" placeholder="note (optional)">${escapeHtml(d.note || "")}</textarea>` +
        `</div>` +
        manualBlock +
        `<div class="hint">j / k or ↑ ↓ to move · ${keys}</div>`;

      el.querySelectorAll('input[name="dec"]').forEach((inp) => {
        inp.onchange = () => setDecision(city, inp.value);
      });
      const note = el.querySelector("#note");
      note.onchange = () => {
        const cur = decisions[city.city_id] || {};
        cur.note = note.value;
        decisions[city.city_id] = cur;
        saveDecisions();
      };

      // manual-rectangle controls
      const drawBtn = el.querySelector("#m-draw");
      if (drawBtn) drawBtn.onclick = () => enterDrawMode(city, drawBtn);
      const clearBtn = el.querySelector("#m-clear");
      if (clearBtn) clearBtn.onclick = () => clearManual(city);
      const applyFields = () => {
        const w = parseFloat(el.querySelector("#m-w").value) * 1000;
        const h = parseFloat(el.querySelector("#m-h").value) * 1000;
        const la = parseFloat(el.querySelector("#m-lat").value);
        const lo = parseFloat(el.querySelector("#m-lon").value);
        if (![w, h, la, lo].every(Number.isFinite) || w <= 0 || h <= 0) return;
        commitManual(city, { center_lat: la, center_lon: lo, width_m: w, height_m: h });
      };
      ["m-w", "m-h", "m-lat", "m-lon"].forEach((id) => {
        const inp = el.querySelector("#" + id);
        if (inp) inp.onchange = applyFields;
      });
    }

    // One decision radio, colored to match its legend layer. "manual" is
    // disabled until a rectangle is drawn (hasManual); its title explains it.
    function radio(city, key, hasManual) {
      const def = DECISION_DEFS[key];
      const cur = (decisions[city.city_id] || {}).decision || "";
      const disabled = key === "manual" && !hasManual;
      const style = disabled ? ' style="opacity:.45;cursor:default"' : "";
      const sw = `<span class="dsw${def.color ? "" : " dnone"}"` +
                 (def.color ? ` style="background:var(--${def.color})"` : "") + `></span>`;
      const suffix = disabled ? " (draw one first)" : "";
      return `<label${style} title="${escapeHtml(def.desc)}">` +
             `<input type="radio" name="dec" value="${key}"` +
             `${disabled ? " disabled" : ""}${cur === key ? " checked" : ""}/>` +
             `${sw}${escapeHtml(def.label)}${suffix}</label>`;
    }

    function setDecision(city, val) {
      const cur = decisions[city.city_id] || {};
      cur.decision = val;
      decisions[city.city_id] = cur;
      saveDecisions();
      // update the list dot + progress without redrawing the map
      const node = document.querySelectorAll(".city")[selIndex];
      if (node) node.querySelector(".dot").className = "dot " + val;
      updateProgress();
      renderChoice(city);       // reflect the new choice on the map + legend
    }

    // ---- manual rectangle editor ----
    // For cities the audit can't fix automatically (NOT_FOUND / NO_POLYGON /
    // wrong OSM match), the reviewer draws the intended grid rectangle. It is
    // stored per city as decisions[id].manual and exported as chosen_* geometry,
    // exactly like an accepted recommendation — apply_decisions.py handles it.
    const HANDLE = L.divIcon({ className: "mh", iconSize: [12, 12] });
    const HANDLE_C = L.divIcon({ className: "mh mhc", iconSize: [14, 14] });
    let drawMode = null;   // active draw-mode handler set, or null

    const manualGeom = (city) => (decisions[city.city_id] || {}).manual || null;

    // Persist a manual rectangle and select the "manual" decision for the city.
    function commitManual(city, g) {
      const cur = decisions[city.city_id] || {};
      cur.manual = { center_lat: +g.center_lat, center_lon: +g.center_lon,
                     width_m: Math.round(g.width_m), height_m: Math.round(g.height_m) };
      cur.decision = "manual";
      decisions[city.city_id] = cur;
      saveDecisions();
      renderManual(city);        // rebuild the rectangle + handles at new coords
      renderInfo(city);          // refresh radios (manual now selected) + fields
      refreshListDot(city, "manual");
      updateProgress();
      renderChoice(city);        // highlight the just-drawn rectangle as chosen
    }

    function clearManual(city) {
      const cur = decisions[city.city_id] || {};
      delete cur.manual;
      if (cur.decision === "manual") cur.decision = "";
      decisions[city.city_id] = cur;
      saveDecisions();
      renderManual(city);
      renderInfo(city);
      refreshListDot(city, "");
      updateProgress();
      renderChoice(city);        // manual decision cleared → drop its highlight
    }

    // Update the selected city's list dot without a full re-render.
    function refreshListDot(city, dec) {
      const node = document.querySelectorAll(".city")[selIndex];
      if (node && visible[selIndex] && visible[selIndex].city_id === city.city_id)
        node.querySelector(".dot").className = "dot " + (dec || "");
    }

    // Live-update the editor number fields during a drag (no persist).
    function liveFields(g) {
      const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
      set("m-w", (g.width_m / 1000).toFixed(2));
      set("m-h", (g.height_m / 1000).toFixed(2));
      set("m-lat", g.center_lat.toFixed(5));
      set("m-lon", g.center_lon.toFixed(5));
    }

    // Draw the manual rectangle with a draggable center (move) + 4 corner
    // handles (resize). Live edits update the shape + fields; dragend commits.
    function renderManual(city) {
      manualLayer.clearLayers();
      const g = manualGeom(city);
      if (!g) return;
      // Solid = committed/saved. A handle drag dashes it to show the edit is in
      // progress; releasing (dragend -> commitManual) redraws it solid = saved.
      const rect = L.rectangle(rectBounds(g.center_lat, g.center_lon, g.width_m, g.height_m),
        { color: COLORS.manual, weight: 3, fill: false }).addTo(manualLayer);
      // While editing: dash the rectangle and drop the stale selection halo
      // (renderChoice redraws it at the new bounds when the drag commits).
      const markEditing = () => { rect.setStyle({ dashArray: "3 4" }); choiceLayer.clearLayers(); };

      const cornersFor = (geom) => {
        const b = L.latLngBounds(rectBounds(geom.center_lat, geom.center_lon,
                                            geom.width_m, geom.height_m));
        return [b.getSouthWest(), b.getSouthEast(), b.getNorthEast(), b.getNorthWest()];
      };
      cornersFor(g).forEach((ll, idx) => {
        const m = L.marker(ll, { draggable: true, icon: HANDLE }).addTo(manualLayer);
        const opp = () => cornersFor(g)[(idx + 2) % 4];
        m.on("drag", (e) => {
          const nb = L.latLngBounds(e.latlng, opp());
          rect.setBounds(nb); markEditing(); liveFields(boundsToGeom(nb));
        });
        m.on("dragend", (e) => commitManual(city, boundsToGeom(L.latLngBounds(e.latlng, opp()))));
      });

      const cm = L.marker([g.center_lat, g.center_lon],
                          { draggable: true, icon: HANDLE_C }).addTo(manualLayer);
      cm.on("drag", (e) => {
        const ng = { ...g, center_lat: e.latlng.lat, center_lon: e.latlng.lng };
        rect.setBounds(rectBounds(ng.center_lat, ng.center_lon, ng.width_m, ng.height_m));
        markEditing(); liveFields(ng);
      });
      cm.on("dragend", (e) => commitManual(city,
        { ...g, center_lat: e.latlng.lat, center_lon: e.latlng.lng }));
    }

    // Drag-to-draw a brand-new rectangle: disables map panning, rubber-bands a
    // box from mousedown to mouseup, then commits it as the manual geometry.
    function enterDrawMode(city, btn) {
      if (drawMode) { exitDrawMode(); return; }
      map.dragging.disable();
      map.getContainer().style.cursor = "crosshair";
      btn.classList.add("drawing");
      btn.textContent = "click-drag on map · Esc to cancel";
      let start = null, rubber = null;
      const onDown = (e) => {
        start = e.latlng;
        rubber = L.rectangle(L.latLngBounds(start, start),
          { color: COLORS.manual, weight: 2, dashArray: "3 4", fill: false }).addTo(map);
      };
      const onMove = (e) => { if (start && rubber) rubber.setBounds(L.latLngBounds(start, e.latlng)); };
      const onUp = (e) => {
        if (start && rubber) {
          const g = boundsToGeom(rubber.getBounds());
          map.removeLayer(rubber);
          exitDrawMode();
          if (g.width_m > 50 && g.height_m > 50) commitManual(city, g);
          else renderInfo(city);   // too tiny — treat as a cancel
        }
      };
      map.on("mousedown", onDown); map.on("mousemove", onMove); map.on("mouseup", onUp);
      drawMode = { onDown, onMove, onUp, rubber: () => rubber };
    }

    function exitDrawMode() {
      if (!drawMode) return;
      map.off("mousedown", drawMode.onDown);
      map.off("mousemove", drawMode.onMove);
      map.off("mouseup", drawMode.onUp);
      const rb = drawMode.rubber && drawMode.rubber();
      if (rb) map.removeLayer(rb);
      drawMode = null;
      map.dragging.enable();
      map.getContainer().style.cursor = "";
    }

    // ---- CSV export ----
    // Resolve a decision to the geometry it selects (or null for skip/undecided),
    // straight from the DECISION_DEFS map — the 1:1 legend-layer mapping.
    function chosenGeom(city, decision) {
      const def = DECISION_DEFS[decision];
      return def ? def.geom(city) || null : null;
    }
    function csvCell(s) {
      s = s === null || s === undefined ? "" : String(s);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }
    function exportCsv() {
      const cols = ["city_id", "display_name", "verdict", "group", "decision",
        "chosen_center_lat", "chosen_center_lon", "chosen_width_m",
        "chosen_height_m", "note"];
      const lines = [cols.join(",")];
      CITIES.forEach((city) => {
        const d = decisions[city.city_id] || {};
        const g = chosenGeom(city, d.decision);
        lines.push([
          city.city_id, city.display_name, city.verdict, city.group,
          d.decision || "", g ? g.center_lat : "", g ? g.center_lon : "",
          g ? g.width_m : "", g ? g.height_m : "", d.note || "",
        ].map(csvCell).join(","));
      });
      const blob = new Blob([lines.join("\n")], { type: "text/csv" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "boundary_decisions.csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    // ---- keyboard navigation ----
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && drawMode) { exitDrawMode(); e.preventDefault(); return; }
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
      if (drawMode) return;   // no list nav / decisions while drawing
      if (e.key === "j" || e.key === "ArrowDown") { selectIndex(selIndex + 1); e.preventDefault(); }
      else if (e.key === "k" || e.key === "ArrowUp") { selectIndex(selIndex - 1); e.preventDefault(); }
      else if (selIndex >= 0 && /^[1-9]$/.test(e.key)) {
        const city = visible[selIndex];
        const key = decOptions(city)[parseInt(e.key, 10) - 1];
        // number keys map to the visible option list; skip disabled "manual"
        if (key && !(key === "manual" && !manualGeom(city))) {
          setDecision(city, key);
          renderInfo(city);
        }
      }
    });

    const searchEl = document.getElementById("search");
    searchEl.oninput = () => { searchTerm = searchEl.value; renderList(); };

    document.getElementById("export").onclick = exportCsv;
    document.getElementById("reset").onclick = () => {
      if (confirm("Clear all saved decisions on this browser?")) {
        decisions = {};
        saveDecisions();
        renderList();
        if (selIndex >= 0) {
          renderManual(visible[selIndex]);
          renderInfo(visible[selIndex]);
          renderChoice(visible[selIndex]);
        }
      }
    };

    // Surface resize cities dropped as unchanged, so a shorter list isn't read
    // as "all clear" — a plan resize that shows here was likely never applied.
    if (META.skipped_resize > 0) {
      const b = document.getElementById("banner");
      b.style.display = "block";
      b.textContent = `${META.skipped_resize} resize ` +
        `${META.skipped_resize === 1 ? "city" : "cities"} not shown ` +
        `(geometry unchanged — already at target, or the resize was never applied).`;
    }

    // ---- boot ----
    renderFilters();
    renderList();
    if (visible.length) selectIndex(0);
  </script>
</body>
</html>
