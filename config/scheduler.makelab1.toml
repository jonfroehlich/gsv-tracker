# Streetscape Tracker scheduler configuration — makelab1 production deploy.
#
# This is the checked-in production config the systemd unit points at
# (--config .../scheduler.makelab1.toml). See config/scheduler.toml for the
# fully-annotated example; comments here are trimmed to what's deploy-specific.
# Parsed with stdlib tomllib (Python 3.11+).

[schedule]
cycle_days = 90            # re-collect each city ~quarterly
grace_days = 7
max_cities_per_day = 20    # cities/day (a city runs all enabled providers)
max_consecutive_failures = 5
city_timeout_minutes = 180
daily_request_budget = 10000000   # legacy fallback; superseded by [providers.*]

# Per-provider daily request budgets (own run series, ledger, failure tracking).
[providers.gsv]
enabled = true
# GSV metadata is free; the real ceiling is the per-minute rate cap (see [download]).
# 10M/day covers cycling ~1,144 cities on the 90-day schedule with headroom.
daily_request_budget = 10000000

[providers.mapillary]
enabled = true
# Counted in z14 vector-tile requests; Mapillary caps at 50,000/day per app.
daily_request_budget = 40000

# Road-walk street-coverage collection (issue #99). Isolated gsv_streets budget
# channel (separate GMAPS_STREETS_API_KEY). Disabled + not yet in `run-due`;
# the collector is a manual CLI whose built-in defaults mirror these values
# (it does not read this file).
[providers.gsv_streets]
enabled = false
daily_request_budget = 2000000
max_requests_per_minute = 24000

[download]
batch_size = 100
connection_limit = 50
request_timeout_s = 30.0
sleep_between_cities_s = 60
# Client-side GSV metadata rate cap. Google approved 60,000 req/min for this
# project (2026-07-16); we pace at 80% to stay clear of the quota alert and
# never write OVER_QUERY_LIMIT rows. Repo default is a conservative 24,000.
max_requests_per_minute = 48000

[paths]
# The checkout + data live on lab storage, NFS-mounted on the compute host.
# ~/streetscape-tracker is a convenience symlink to this path (see deploy/README.md).
data_dir = "/projects/makeabilitylab/streetscape-tracker/data"
db_path  = "/projects/makeabilitylab/streetscape-tracker/data/streetscape_tracker.db"
log_dir  = "/projects/makeabilitylab/streetscape-tracker/logs"

[publish]
# After each successful nightly batch, publish *.csv.gz/*.json.gz to the public
# docroot. STREETSCAPE_PUBLISH_LOCAL=1 (set in the systemd unit) makes this a LOCAL rsync
# into the NFS-mounted docroot — no SSH hop. The script excludes the DB/logs/bare
# CSVs, so only sanitized artifacts ever reach the web server.
enabled = true
publish_script = "/projects/makeabilitylab/streetscape-tracker/sync_data_to_server.sh"

[alerts]
# Email on an unhealthy night (>= failure_threshold failed collections) or crash.
# transport = "smtp" (not "mail"): the local mailer is silently BLOCKED under
# the systemd sandbox — its setgid postdrop path trips NoNewPrivileges, so the
# alert never sends even though the failure is detected (#144). The stdlib
# smtplib path talks to the campus relay directly and works in the sandbox.
enabled = true
recipient = "jonf@cs.uw.edu"
transport = "smtp"
# Campus relay: reachable from makelab2, unauthenticated for on-campus hosts,
# plain port 25 (verified 2026-07-17). smtp_from MUST be a real deliverable
# address — the relay rejects streetscape-tracker@<hostname> as "Address
# unknown", so alerts appear to come from jonf@ (Reply-To not needed).
smtp_host = "smtp.cs.washington.edu"
smtp_port = 25
smtp_from = "jonf@cs.washington.edu"
failure_threshold = 1
subject_prefix = "[streetscape-tracker]"

[resource_guard]
# makelab1 is shared with other lab services. Before each city, back off this
# run's concurrency if the box is already under pressure (48 cores / 187 GB, so
# the load ceiling is ~43). Complements the static CPU/RAM caps in the systemd
# unit. See config/scheduler.toml for field docs.
enabled = true
min_available_memory_gb = 8.0
max_load_per_core = 0.9
min_connection_limit = 5
