# Streetscape Tracker scheduler configuration.
#
# This example is checked into git; the production copy on makelab1 can
# diverge (pass --config to point at it, or edit this file in place there).
# Parsed with stdlib tomllib (Python 3.11+).

[schedule]
# Each city is re-collected roughly every cycle_days; grace_days lets a city
# run slightly early so the stagger stays smooth.
cycle_days = 90
grace_days = 7

# max_cities_per_day counts cities, not runs — a city due for both
# providers runs both back-to-back with the same run date.
max_cities_per_day = 20

# A (city, provider) pair is skipped after this many consecutive failures
# until re-enabled.
max_consecutive_failures = 5
# Floor for the per-city subprocess timeout. For GSV the effective timeout is
# derived from the grid's estimated request count and max_requests_per_minute
# (with headroom), so large cities are not SIGKILLed mid-run; this floor still
# applies to small cities and to the fast Mapillary provider.
city_timeout_minutes = 180

# Legacy fallback: when no [providers.*] sections exist below, this is the
# GSV daily budget and only GSV is collected.
daily_request_budget = 10000000

# Per-provider daily request budgets. Each provider keeps its own run
# series, budget ledger, and failure tracking; both are collected for a
# city on the same day so cross-provider snapshots align.
[providers.gsv]
enabled = true
# Daily ceiling on GSV metadata API requests across all cities. This is a
# nightly-runtime knob, NOT a cost/quota limit: metadata requests are free
# of charge (developers.google.com/maps/documentation/streetview/metadata);
# the hard limit is the project's queries/minute quota (default 30,000),
# enforced client-side by [download].max_requests_per_minute below — a fast
# host can otherwise exceed the quota (makelab1 sustained ~470 req/s
# unpaced on 2026-07-16 and got throttled).
# Cycling ~1,144 cities every 90 days needs ~6.7M/day (median city ~54k pts,
# not the ~15-25k first assumed). 10M/day covers that with headroom and runs
# ~9 h on a full-budget night; only ~5 giant cities (Juneau, Anchorage, …)
# exceed it and are collected manually. Raise for faster cycling; the
# per-minute pacing (not this number) is the real ceiling.
daily_request_budget = 10000000

[providers.mapillary]
enabled = true
# Counted in z14 vector-tile requests (each tile carries every image's
# metadata for a ~2 km square — a city is typically 10-100 tiles).
# Mapillary caps tile requests at 50,000/day per application.
daily_request_budget = 40000

# Road-walk street-coverage collection (issue #99). ISOLATED budget channel:
# metered in api_usage under the 'gsv_streets' provider string and served by
# the separate GMAPS_STREETS_API_KEY, so a per-sample-point road crawl can't
# exhaust the production grid collector's quota. Disabled by default and NOT
# yet wired into `run-due` — the collector is a manual CLI
# (`python -m streetscape_street_analyzer.collect`) whose built-in defaults
# MIRROR these values (it does not read this file). GSV metadata requests are
# free of charge; the real ceiling is the streets key's own per-minute quota
# (a fresh key resets to Google's default ~30,000/min), paced client-side at
# ~80% below.
[providers.gsv_streets]
enabled = false
daily_request_budget = 2000000
max_requests_per_minute = 24000

[download]
# Conservative defaults; see cli.py docstring for tuning guidance.
batch_size = 100
connection_limit = 50
request_timeout_s = 30.0
# Client-side cap on gsv metadata requests/minute, applied per city run.
# Keep this at ~80% of the project's granted per-minute quota (default
# quota 30,000 -> 24000 here); server-side throttling (OVER_QUERY_LIMIT)
# burns retries and can abort a run. 0 disables pacing.
max_requests_per_minute = 24000
# Pause between cities to spread load.
sleep_between_cities_s = 60

[paths]
# Absolute paths recommended for the systemd deployment. Defaults (when
# omitted) are relative to the repo: ./data, ./data/streetscape_tracker.db, ./logs
#data_dir = "/homes/gws/jonf/streetscape-tracker/data"
#db_path  = "/homes/gws/jonf/streetscape-tracker/data/streetscape_tracker.db"
#log_dir  = "/homes/gws/jonf/streetscape-tracker/logs"

[publish]
# When true, run the publish script after each successful daily batch.
enabled = false
#publish_script = "/homes/gws/jonf/streetscape-tracker/sync_data_to_server.sh"

[alerts]
# Email the operator when a nightly run finishes unhealthy (>= failure_threshold
# failed collections) or crashes. OFF until enabled + a recipient are set;
# nothing is ever sent otherwise. Independent of (and complementary to) the
# optional systemd OnFailure= hook — see deploy/README.md.
enabled = false
#recipient = "jonf@cs.uw.edu"
# Transport: "smtp" (stdlib smtplib straight to a relay — the sandbox-safe
# choice, see below), "mail" (uses a local relay), "msmtp"/"sendmail" (SMTP),
# or "command" (an arbitrary shell command; body on stdin, subject/recipient in
# $STREETSCAPE_ALERT_SUBJECT/$STREETSCAPE_ALERT_TO — e.g. a Slack webhook curl). Confirm which
# works on the box first:  echo test | mail -s test jonf@cs.uw.edu
transport = "mail"
#command = ""
# --- transport = "smtp" settings (issue #144) ---
# Prefer this under systemd: it never touches the local setgid mailer, so a
# hardened unit (NoNewPrivileges / ProtectSystem=strict) can't break the send.
# smtp_host is the only required field; the rest are opt-in for the relay.
#smtp_host = "smtp.cs.washington.edu"   # UW CSE relay: no-auth for on-campus hosts
#smtp_port = 25                          # 587 for a submission port
# smtp_from defaults to streetscape-tracker@<hostname>, but many relays (incl.
# smtp.cs.washington.edu) reject a non-deliverable sender with "550 Address
# unknown" — set a real mailbox there.
#smtp_from = "you@cs.washington.edu"
#smtp_starttls = false                   # true on a submission/TLS port
#smtp_user = ""                          # set with a password to authenticate
# Password for smtp_user. Prefer the env var over the toml so no secret is
# committed: STREETSCAPE_ALERT_SMTP_PASSWORD (env wins if both are set).
#smtp_password = ""
# Alert when at least this many (city, provider) collections failed. Raise it
# to avoid paging on the occasional flaky single city.
failure_threshold = 1
#subject_prefix = "[streetscape-tracker]"

[resource_guard]
# Be a good tenant on a shared host: before each city, check load + free RAM
# and lower this run's own concurrency (--connection-limit) when the box is
# already busy. Best-effort and Linux-only (reads /proc); a no-op elsewhere.
# The systemd unit's CPU/RAM caps are the static floor; this is the dynamic
# courtesy on top. Set enabled = false to disable.
enabled = true
# Throttle to min_connection_limit when MemAvailable drops below this.
min_available_memory_gb = 8.0
# Throttle when the 5-minute load average exceeds this * CPU count.
max_load_per_core = 0.9
# Never throttle concurrency below this floor.
min_connection_limit = 5
