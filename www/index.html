<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streetscape Tracker — City Explorer</title>

  <!-- Stylesheets (CDN assets carry SRI hashes: a compromised or tampered
       CDN response is refused by the browser rather than executed) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"
        integrity="sha512-Zcn6bjR/8RZbLEpLIeOwNtzREBAJnUKESxces60Mpoj+2okopSAcSUIUOseddDm0cxnGQzxIR7vJgsLZbdLE3w=="
        crossorigin="anonymous" />
  <link rel="stylesheet" href="css/streetscape-shared.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZSQGNSTEES"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-ZSQGNSTEES");
  </script>

  <fieldset id="provider-toggle" class="provider-toggle"
            aria-label="Imagery provider">
    <legend class="visually-hidden">Imagery provider</legend>
    <label>
      <input type="radio" name="provider" value="gsv" checked>
      <span>Google Street View</span>
    </label>
    <label>
      <input type="radio" name="provider" value="mapillary">
      <span>Mapillary</span>
    </label>
  </fieldset>

  <fieldset id="metric-toggle" class="provider-toggle metric-toggle"
            aria-label="Color cities by">
    <legend class="visually-hidden">Color cities by</legend>
    <label>
      <input type="radio" name="metric" value="age" checked>
      <span>Median age</span>
    </label>
    <label>
      <input type="radio" name="metric" value="coverage">
      <span>Coverage</span>
    </label>
    <label>
      <input type="radio" name="metric" value="coverage_any">
      <span title="Mapillary's full footprint including flat imagery; equals Coverage for Google Street View">Any imagery</span>
    </label>
  </fieldset>

  <div id="city-search" class="city-search" role="search" aria-label="Search cities">
    <input id="city-search-input" type="text"
           placeholder="Search for a city…"
           autocomplete="off"
           aria-label="Search for a city"
           aria-controls="city-search-results"
           aria-autocomplete="list"
           role="combobox"
           aria-expanded="false" />
    <button id="city-search-reset" class="city-search-reset"
            type="button" aria-label="Reset map view" title="Reset map view">
      ✕
    </button>
    <ul id="city-search-results" class="city-search-results" role="listbox"></ul>
  </div>

  <div id="map" role="application" aria-label="World map of street-level imagery coverage"></div>

  <div id="loading" class="loading" role="status" aria-live="polite">
    Loading city data…
  </div>

  <div id="stats" aria-live="polite"></div>

  <div class="chart-container" aria-label="Scatter-plot charts">
    <div class="scatter-plot-container">
      <canvas id="panoScatter" role="img"
              aria-label="Scatter plot of total panorama count versus median age for each city"></canvas>
    </div>
    <div class="scatter-plot-container">
      <canvas id="areaScatter" role="img"
              aria-label="Scatter plot of city area versus median age for each city"></canvas>
    </div>
  </div>

  <div id="legend" class="legend" role="group" aria-label="Median age legend"></div>

  <!-- Scripts (order matters: libs → shared utils → page logic) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"
          integrity="sha512-BwHfrr4c9kmRkLw6iXFdzcdWV/PGkVgiIyIWLLlTSXzWQzxuSg4DiQUCpauz/EWjgk5TYQqX/kvn9pG1NpYfqg=="
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"
          integrity="sha512-ZwR1/gSZM3ai6vCdI+LVF1zSq/5HznD3ZSTk7kajkaj4D292NLuduDCO1c/NT8Id+jE58KYLKT7hXnbtryGmMg=="
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"
          integrity="sha512-g2TeAWw5GPnX7z0Kn8nFbYfeHcvAu/tx6d6mrLe/90mkCxO+RcptyYpksUz35EO337F83bZwcmUyHiHamspkfg=="
          crossorigin="anonymous"></script>
  <script src="js/streetscape-utils.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
